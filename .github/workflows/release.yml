name: Release

# When a version tag is pushed (e.g. v0.2.0), build the app and attach the
# single-file index.html to a GitHub Release for that tag.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish release with build asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ github.ref_name }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" dist/index.html --clobber
          else
            gh release create "$tag" dist/index.html \
              --title "Contour $tag" \
              --generate-notes
          fi
