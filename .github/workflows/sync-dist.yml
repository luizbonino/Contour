name: Sync built dist

# Keep the committed dist/ in sync with source on every push to main, so the
# self-contained single-file app can be downloaded and run straight from the
# repository (no build step). GitHub Pages is handled separately by
# deploy-pages.yml; this only refreshes the checked-in build output.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

# Serialize runs so concurrent pushes don't race on the commit-back.
concurrency:
  group: sync-dist
  cancel-in-progress: false

jobs:
  build-and-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Commit dist if it changed
        if: github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain dist)" ]; then
            git add dist
            # [skip ci] prevents this auto-commit from re-triggering any workflow.
            git commit -m "chore: rebuild dist [skip ci]"
            git push origin HEAD:main
          else
            echo "dist already up to date."
          fi
